name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: the runner requests a short-lived token to assume the AWS deploy role.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'template.yaml'
              - 'samconfig.toml'
              - 'worldcup_predictor/**'
              - 'scripts/deploy-api.ps1'
            frontend:
              - 'frontend/**'
              - 'scripts/deploy-frontend.ps1'

  deploy-api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Deploy API stack
        shell: pwsh
        run: ./scripts/deploy-api.ps1

  deploy-frontend:
    needs: [changes, deploy-api]
    if: ${{ always() && needs.changes.outputs.frontend == 'true' && needs.deploy-api.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Deploy frontend
        shell: pwsh
        run: ./scripts/deploy-frontend.ps1
